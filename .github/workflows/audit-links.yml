name: Audit Links

on:
  workflow_dispatch:
  schedule:
    - cron: "30 20 1 * *"

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit links
        run: npm run audit:links

      - name: Commit audit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/review/link-audit.json

          if git diff --cached --quiet; then
            echo "No audit changes"
            exit 0
          fi

          git commit -m "chore(data): update link audit results [skip ci]"
          git push
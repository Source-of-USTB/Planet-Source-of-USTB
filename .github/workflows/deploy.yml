name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build generated data
        run: npm run build:data
      
      - name: Build post counts
        if: github.event_name == 'schedule'
        run: npm run build:post-counts

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/data/generated

          if git diff --cached --quiet; then
            echo "No generated data changes"
            exit 0
          fi

          git commit -m "chore(data): update generated feed data [skip ci]"
          git push

      - name: Build site
        run: npm run build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      
      - name: Upload status reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: status-reports
          path: src/data/generated/*-status.json
          retention-days: 30

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5